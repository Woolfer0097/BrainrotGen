name: CI pipeline

on:
  push:
    branches: [main, develop, feature/ci-cd-pipeline]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pip install poetry

      - name: Cache Poetry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pypoetry
            ~/.virtualenvs
          key: ${{ runner.os }}-poetry-${{ hashFiles('**/poetry.lock') }}

      - name: Configure Poetry
        run: poetry config virtualenvs.create false

      - name: Install dependencies
        run: poetry install --no-interaction --no-root --with dev

      - name: Generate CI report
        run: |
          echo "## CI Report" > report.md

          echo "### > Black" >> report.md
          poetry run black --check . >> report.md 2>&1 || true

          echo -e "\n### > Flake8" >> report.md
          poetry run flake8 . >> report.md 2>&1 || true

          echo -e "\n### > Radon Cyclomatic Complexity" >> report.md
          poetry run radon cc . -s -a >> report.md 2>&1 || true

          echo -e "\n### > Radon Maintainability Index" >> report.md
          poetry run radon mi . -s >> report.md 2>&1 || true

          echo -e "\n### > Tests + Coverage" >> report.md
          poetry run pytest --cov=. --cov-report=term >> report.md 2>&1 || true

          echo -e "\n### > Security Audit (pip-audit)" >> report.md
          poetry run pip-audit --format markdown >> report.md 2>&1 || true

      - name: Comment PR with report
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false && github.actor != 'dependabot[bot]'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('report.md', 'utf8');

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: report
            });

      - name: Run strict checks
        run: |
          poetry run black --check .
          poetry run flake8 .
          poetry run radon cc . --fail C
          poetry run radon mi . --fail B
          poetry run pip-audit --fail-on high
          poetry run pytest --cov=. --cov-fail-under=80
